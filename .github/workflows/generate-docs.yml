name: Refresh Markdown Metadata

on:
  push:
    branches: [main]
    paths:
      - '**.md'
      - '.github/workflows/generate-docs.yml'
    paths-ignore:
      - '**/ROADMAP.md'
      - '**/roadmap.md'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-markdown-metadata
  cancel-in-progress: true

jobs:
  refresh-markdown:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update date in frontmatter
        run: |
          today=$(date '+%B %-d, %Y')
          find . -name "*.md" -not -name "README.md" \
            -not -path "./.github/*" -not -path "./node_modules/*" \
            | while read -r md_file; do
              if head -1 "$md_file" | grep -q '^---$'; then
                sed -i "s/^date: .*/date: \"$today\"/" "$md_file"
                echo "  Updated date -> $today in $md_file"
              fi
            done

      - name: Commit markdown metadata updates
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add '*.md' 2>/dev/null || true
          if ! git diff --staged --quiet; then
            git commit -m "docs: refresh markdown metadata [skip ci]"
            git pull --rebase origin main
            git push
          else
            echo "No markdown metadata changes to commit"
          fi
